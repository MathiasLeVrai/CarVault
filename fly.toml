# fly.toml app configuration file generated for carvault on 2026-02-10T16:34:57+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'carvault'
primary_region = 'cdg'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'carvault_uploads'
  destination = '/app/backend/uploads'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512

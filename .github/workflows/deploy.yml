# Pipeline unique : à chaque push sur main → on vérifie le code, puis on déploie.
# Lecture de haut en bas : job "verifier" d'abord, job "deployer" ensuite.
name: CI/CD

on:
  push:
    branches: [main]

jobs:
  # 1) Vérifie que le code est sain (lint + schéma Prisma + build frontend).
  verifier:
    name: Vérifier le code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend — install, lint, Prisma
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
        run: |
          npm ci
          npm run lint
          npx prisma validate

      - name: Frontend — install, lint, build
        working-directory: frontend
        run: |
          npm ci
          npm run lint -- --max-warnings 20
          npm run build

  # 2) Tests E2E (8 parcours) + rapport d'exécution.
  e2e:
    name: Tests E2E
    needs: verifier
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carvault_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/carvault_e2e
          JWT_SECRET: e2e-ci-secret
          CI: true
        run: npm run test:e2e

      - name: Upload rapport HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-html
          path: e2e/reports/html/

      - name: Upload rapport JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-junit
          path: e2e/reports/junit.xml

  # 3) Déploie sur Fly.io — uniquement si vérification et E2E ont réussi.
  deployer:
    name: Déployer sur Fly.io
    needs: [verifier, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Fly renvoie parfois un 408 en provisionnant la VM du release_command
      # (migrations Prisma) : panne transitoire côté infra, pas une erreur de code.
      # On réessaie jusqu'à 3 fois avec une pause avant d'abandonner.
      - name: Déployer (avec retry sur les 408 transitoires de Fly)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          for tentative in 1 2 3; do
            echo "▶ Tentative de déploiement n°$tentative"
            if flyctl deploy --remote-only; then
              echo "✔ Déploiement réussi à la tentative n°$tentative"
              exit 0
            fi
            echo "✖ Échec de la tentative n°$tentative"
            if [ "$tentative" -lt 3 ]; then
              echo "⏳ Nouvelle tentative dans 20s…"
              sleep 20
            fi
          done
          echo "✖ Déploiement échoué après 3 tentatives."
          exit 1

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint -- --max-warnings 20

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  validate-prisma:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma validate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      - run: npx prisma generate

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint-backend, build-frontend, validate-prisma]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # On `push` (main): authenticate to Fly's registry so the image can be
      # pushed and reused by the deploy workflow. On PRs we only build (no push,
      # secrets unavailable) to keep the Dockerfile validated.
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: github.event_name == 'push'

      - name: Log in to Fly registry
        if: github.event_name == 'push'
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: registry.fly.io/carvault:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

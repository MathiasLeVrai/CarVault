services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: carvio
      POSTGRES_PASSWORD: carvio
      POSTGRES_DB: carvio
    volumes:
      - carvio_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carvio -d carvio']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:8080'
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://carvio:carvio@db:5432/carvio
      JWT_SECRET: ${JWT_SECRET:-docker-dev-secret-change-me}
      NODE_ENV: production
      PORT: 8080
      APP_URL: ${APP_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      UPLOAD_DIR: ./uploads
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
    volumes:
      - carvio_uploads:/app/backend/uploads
    entrypoint: ['/bin/sh', '/app/backend/docker/entrypoint.sh']

volumes:
  carvio_pg_data:
  carvio_uploads:
